# =============================================================================
# QuantOffice Nginx 反向代理 + 静态前端
# -----------------------------------------------------------------------------
# 拷贝位置（二选一）：
#   /etc/nginx/conf.d/quantoffice.conf          # RHEL/CentOS/Ubuntu 直接 include
#   /etc/nginx/sites-available/quantoffice.conf # Debian/Ubuntu 软链到 sites-enabled
#
# 启用：
#   sudo cp deploy/nginx/quantoffice.conf /etc/nginx/conf.d/quantoffice.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# 端口：后端 8765（本机直连），对外 80（HTTP）/ 443（自行加 TLS）
# 前端构建产物：/workspace/frontend/dist（由 ./deploy.sh install 生成）
# =============================================================================

# 后端 upstream
upstream quantoffice_backend {
    server 127.0.0.1:8765;
    keepalive 32;
}

server {
    listen      80 default_server;
    listen [::]:80 default_server;
    server_name _;   # 替换成你的域名（如 api.example.com）

    client_max_body_size 50M;

    # 日志
    access_log /var/log/nginx/quantoffice.access.log;
    error_log  /var/log/nginx/quantoffice.error.log warn;

    # gzip
    gzip on;
    gzip_min_length 1k;
    gzip_types text/plain text/css application/json application/javascript
               application/xml application/xml+rss text/javascript
               image/svg+xml font/ttf font/otf;

    # ---------- 静态前端 ----------
    # Vite 构建产物（HASH 化的 chunk，缓存 7 天）
    location /assets/ {
        alias /workspace/frontend/dist/assets/;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # favicon / robots 等顶层静态文件
    location ~* ^/(favicon\.ico|robots\.txt|logo.*\.png)$ {
        root /workspace/frontend/dist;
        expires 1d;
        access_log off;
    }

    # SPA 入口:未命中的路径都回 index.html（React Router 接管）
    location / {
        root /workspace/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ---------- 后端 API ----------
    location /api/ {
        proxy_pass http://quantoffice_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # FastAPI /docs /openapi.json
    location ~* ^/(docs|redoc|openapi\.json)$ {
        proxy_pass http://quantoffice_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- WebSocket / SSE ----------
    location /ws {
        proxy_pass http://quantoffice_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;   # 长连接 1h
    }
}
